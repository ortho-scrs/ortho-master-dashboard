  .card:hover { border-color: #0ea5e9; transform: translateY(-2px); }
  .card .icon { font-size: 36px; margin-bottom: 12px; }
  .card h3 { font-size: 18px; font-weight: 700; }
  .divider { width: 100%; max-width: 700px; border: none; border-top: 1px solid #1e2d42; }
</style>
