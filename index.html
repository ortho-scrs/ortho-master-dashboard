<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmileCrew Dashboards</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #080c14; color: #e2e8f0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 24px; }
  h1 { font-size: 24px; font-weight: 800; letter-spacing: 0.05em; }
  .cards { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  .card { background: #0e1520; border: 1px solid #1e2d42; border-radius: 12px; padding: 32px 40px; text-align: center; text-decoration: none; color: #e2e8f0; transition: all 0.2s; }
  .card:hover { border-color: #0ea5e9; transform: translateY(-2px); }
  .card .icon { font-size: 36px; margin-bottom: 12px; }
  .card h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .card p { font-size: 13px; color: #64748b; }
</style>
</head>
<body>
  <h1>🦷 SmileCrew Dashboards</h1>
  <div class="cards">
    <a class="card" href="michigan.html">
      <div class="icon">📍</div>
      <h2>Michigan</h2>
      <p>Independence Township, MI</p>
    </a>
    <a class="card" href="location2.html">
      <div class="icon">📍</div>
      <h2>Buda, TX</h2>
      <p>Austin Area, TX</p>
    </a>
  </div>
</body>
</html>
