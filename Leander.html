<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmileCrew Leander Patient Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg: #080c14;
    --surface: #0e1520;
    --surface2: #151e2e;
    --border: #1e2d42;
    --accent: #0ea5e9;
    --accent2: #38bdf8;
    --red: #ef4444;
    --green: #22c55e;
    --yellow: #facc15;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    position: relative;
    z-index: 1000;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--yellow), #f59e0b);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .brand-text h1 { font-size: 16px; font-weight: 800; letter-spacing: 0.05em; text-transform: uppercase; }
  .brand-text small { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .header-controls { display: flex; align-items: center; gap: 24px; }
  .period-toggle {
    display: flex;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .period-toggle button {
    background: transparent;
    border: none;
    color: var(--text-muted);
    padding: 8px 14px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .period-toggle button.active { background: var(--accent); color: #fff; }
  .period-toggle button:hover:not(.active) { background: var(--surface2); color: var(--text); }
  .status-toggles { display: flex; gap: 16px; align-items: center; }
  .toggle-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; cursor: pointer; user-select: none;
  }
  .toggle-item.noshow { color: var(--red); }
  .toggle-item.dismissed { color: var(--green); }
  .toggle-switch { position: relative; width: 40px; height: 22px; }
  .toggle-switch input { display: none; }
  .toggle-track {
    position: absolute; inset: 0; border-radius: 11px;
    background: var(--border); transition: background 0.25s; cursor: pointer;
  }
  .toggle-thumb {
    position: absolute; top: 3px; left: 3px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; transition: transform 0.25s; pointer-events: none;
  }
  .toggle-item.noshow .toggle-switch input:checked ~ .toggle-track { background: var(--red); }
  .toggle-item.dismissed .toggle-switch input:checked ~ .toggle-track { background: var(--green); }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(18px); }
  .stats-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; height: 72px;
    display: flex; align-items: center; gap: 0; flex-shrink: 0;
  }
  .stat-card {
    display: flex; flex-direction: column; gap: 3px;
    padding: 0 28px 0 0; margin-right: 28px;
    border-right: 1px solid var(--border);
  }
  .stat-card:last-child { border-right: none; }
  .stat-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); font-family: 'DM Mono', monospace; }
  .stat-value { font-size: 22px; font-weight: 800; line-height: 1; }
  .stat-value.red { color: var(--red); }
  .stat-value.green { color: var(--green); }
  .stat-value.blue { color: var(--accent2); }
  .stat-value.period { color: var(--text); font-size: 16px; }
  #loading-overlay {
    position: fixed; inset: 0;
    background: rgba(8,12,20,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 9999; gap: 20px;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--text-dim); letter-spacing: 0.05em; }
  .loading-progress { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }
  #map-container { flex: 1; position: relative; overflow: hidden; }
  #map { width: 100%; height: 100%; }
  .leaflet-container { background: #0a1628 !important; font-family: 'Syne', sans-serif; }
  .leaflet-popup-content-wrapper {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; box-shadow: var(--card-shadow); color: var(--text);
  }
  .leaflet-popup-tip { background: var(--surface2); }
  .leaflet-popup-content { margin: 14px 16px; font-family: 'Syne', sans-serif; }
  .popup-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--accent2); }
  .popup-row { display: flex; justify-content: space-between; gap: 16px; font-size: 12px; margin-bottom: 4px; font-family: 'DM Mono', monospace; }
  .popup-key { color: var(--text-muted); }
  .popup-val { color: var(--text); font-weight: 500; text-align: right; }
  .popup-status-noshow { color: var(--red); font-weight: 700; }
  .popup-status-dismissed { color: var(--green); font-weight: 700; }
  .patient-label { background: transparent; border: none; box-shadow: none; }
  .patient-label-inner {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
    color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.9), 0 0 6px rgba(0,0,0,0.8);
    white-space: nowrap; pointer-events: none;
  }
  .line-tooltip {
    background: var(--surface2) !important; border: 1px solid var(--border) !important;
    color: var(--text) !important; font-family: 'DM Mono', monospace !important;
    font-size: 12px !important; border-radius: 6px !important;
    padding: 6px 10px !important; box-shadow: var(--card-shadow) !important;
  }
  .map-legend {
    position: absolute; bottom: 30px; right: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px; z-index: 500; min-width: 160px;
  }
  .legend-title { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; font-family: 'DM Mono', monospace; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  /* TABLES */
  .tables-container {
    position: absolute;
    top: 12px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 280px;
    z-index: 500;
    max-height: calc(100% - 24px);
    overflow: hidden;
  }
  .data-table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: 180px;
    opacity: 0.93;
  }
  .table-header {
    padding: 7px 10px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'DM Mono', monospace;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .table-header.red { color: var(--red); }
  .table-header.green { color: var(--green); }
  .table-scroll { overflow-y: auto; flex: 1; }
  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th {
    padding: 5px 8px;
    text-align: left;
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
    background: var(--surface2);
    position: sticky;
    top: 0;
  }
  .data-table td {
    padding: 5px 8px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: var(--surface2); }
  .zip-rank { color: var(--text-muted); font-size: 10px; }
  .zip-code { font-weight: 600; color: var(--text); }
  .zip-count-red { color: var(--red); font-weight: 700; }
  .zip-count-green { color: var(--green); font-weight: 700; }
  .zip-income { color: var(--accent2); }

  @media (max-width: 768px) {
    header { padding: 12px; height: auto; flex-wrap: wrap; gap: 12px; }
    .stats-bar { height: auto; flex-wrap: wrap; padding: 12px; gap: 12px; }
    .stat-card { border-right: none; padding: 0; margin: 0; }
    .header-controls { flex-wrap: wrap; gap: 12px; }
  }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">Loading dashboard...</div>
  <div class="loading-progress" id="loading-progress"></div>
</div>

<header>
  <div class="brand" onclick="window.location.href='index.html'" style="cursor:pointer">
    <div class="brand-icon">🦷</div>
    <div class="brand-text">
      <h1>SmileCrew — Leander, TX</h1>
      <small>Patient Appointment Dashboard</small>
    </div>
  </div>
  <div class="header-controls">
    <div class="period-toggle">
      <button class="active" data-period="monthly" onclick="setPeriod('monthly')">Last Month</button>
      <button data-period="q1" onclick="setPeriod('q1')">Q1</button>
      <button data-period="q2" onclick="setPeriod('q2')">Q2</button>
      <button data-period="q3" onclick="setPeriod('q3')">Q3</button>
      <button data-period="q4" onclick="setPeriod('q4')">Q4</button>
      <button data-period="annual" onclick="setPeriod('annual')">Annual</button>
    </div>
    <div class="status-toggles">
      <label class="toggle-item noshow">
        <span>No-Show</span>
        <div class="toggle-switch">
          <input type="checkbox" id="toggle-noshow" checked onchange="updateFilters()">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </div>
      </label>
      <label class="toggle-item dismissed">
        <span>Dismissed</span>
        <div class="toggle-switch">
          <input type="checkbox" id="toggle-dismissed" checked onchange="updateFilters()">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </div>
      </label>
    </div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-card">
    <div class="stat-label">No-Shows</div>
    <div class="stat-value red" id="stat-noshows">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Dismissed</div>
    <div class="stat-value green" id="stat-dismissed">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Median Distance</div>
    <div class="stat-value blue" id="stat-distance">—</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Period</div>
    <div class="stat-value period" id="stat-period">—</div>
  </div>
</div>

<div id="map-container">
  <div id="map"></div>
  <div class="tables-container">
  <div class="data-table-wrap">
    <div class="table-header red">🔴 No-Show Zip Codes</div>
    <div class="table-scroll">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Zip Code</th>
            <th>Count</th>
            <th>Median Income</th>
          </tr>
        </thead>
        <tbody id="noshow-table-body">
          <tr><td colspan="4" style="color:var(--text-muted);text-align:center">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <div class="data-table-wrap">
    <div class="table-header green">🟢 Dismissed Zip Codes</div>
    <div class="table-scroll">
      <table class="data-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Zip Code</th>
            <th>Count</th>
            <th>Median Income</th>
          </tr>
        </thead>
        <tbody id="dismissed-table-body">
          <tr><td colspan="4" style="color:var(--text-muted);text-align:center">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
  <div class="map-legend">
    <div class="legend-title">Legend</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div> Clinic</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> No-Show</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div> Dismissed</div>
  </div>
</div>

<script>
const CSV_URL = 'https://script.google.com/macros/s/AKfycbwTIcgnBlOi4uj8kreIUhco27NBoPXv7itt-1XmkKKt7nc3a_FpI_5z9-cnqqf7g2rqkw/exec';
const CLINIC_COORDS = [30.5717, -97.8531]; // 10824 E Crystal Falls Pkwy, Leander, TX
const CLINIC_ADDR = '10824 E Crystal Falls Pkwy STE 203, Leander, TX 78641';

let map, allPatients = [], currentPeriod = 'monthly';
let noShowLayers = [], dismissedLayers = [];

map = L.map('map', { center: CLINIC_COORDS, zoom: 10, zoomControl: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '©OpenStreetMap ©CartoDB', subdomains: 'abcd', maxZoom: 19
}).addTo(map);

const clinicIcon = L.divIcon({
  html: `<div style="width:22px;height:22px;background:#facc15;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.5)"></div>`,
  iconSize: [22,22], iconAnchor: [11,22], className: ''
});
L.marker(CLINIC_COORDS, { icon: clinicIcon }).addTo(map)
  .bindPopup(`<div class="popup-title">🦷 Clinic — Leander, TX</div><div class="popup-row"><span class="popup-key">Address</span><span class="popup-val">${CLINIC_ADDR}</span></div>`);

function haversineDistance(lat1, lon1, lat2, lon2) {
  const R = 3958.8;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function filterByPeriod(patients, period) {
  const now = new Date();
  const lastMonth = new Date(now.getFullYear(), now.getMonth()-1, 1);
  return patients.filter(p => {
    if (!p.appointmentTime) return true;
    const d = new Date(p.appointmentTime);
    if (isNaN(d)) return true;
    if (period === 'monthly') return d.getFullYear() === lastMonth.getFullYear() && d.getMonth() === lastMonth.getMonth();
    if (period === 'q1') return d.getFullYear() === now.getFullYear() && d.getMonth() <= 2;
    if (period === 'q2') return d.getFullYear() === now.getFullYear() && d.getMonth() >= 3 && d.getMonth() <= 5;
    if (period === 'q3') return d.getFullYear() === now.getFullYear() && d.getMonth() >= 6 && d.getMonth() <= 8;
    if (period === 'q4') return d.getFullYear() === now.getFullYear() && d.getMonth() >= 9;
    return d.getFullYear() === now.getFullYear();
  });
}

function getPeriodLabel(period) {
  const now = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const lastMonth = new Date(now.getFullYear(), now.getMonth()-1, 1);
  if (period === 'monthly') return `${months[lastMonth.getMonth()]} ${lastMonth.getFullYear()}`;
  if (period === 'q1') return `Q1 ${now.getFullYear()}`;
  if (period === 'q2') return `Q2 ${now.getFullYear()}`;
  if (period === 'q3') return `Q3 ${now.getFullYear()}`;
  if (period === 'q4') return `Q4 ${now.getFullYear()}`;
  return `${now.getFullYear()}`;
}

function clearMapLayers() {
  noShowLayers.forEach(l => map.removeLayer(l));
  dismissedLayers.forEach(l => map.removeLayer(l));
  noShowLayers = []; dismissedLayers = [];
}

function makePin(color) {
  return L.divIcon({
    html: `<div style="width:18px;height:18px;background:${color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:2px solid rgba(255,255,255,0.7);box-shadow:0 2px 8px rgba(0,0,0,0.6)"></div>`,
    iconSize: [18,18], iconAnchor: [9,18], className: ''
  });
}

function renderPatients(patients) {
  clearMapLayers();
  const showNoShow = document.getElementById('toggle-noshow').checked;
  const showDismissed = document.getElementById('toggle-dismissed').checked;
  let noshoCount = 0, dismissCount = 0, distances = [];

  patients.forEach(p => {
    if (!p.coords) return;
    const isNoShow = p.status === 'No-Show';
    const isDismissed = p.status === 'Dismissed';
    if (!isNoShow && !isDismissed) return;
    if (isNoShow && !showNoShow) return;
    if (isDismissed && !showDismissed) return;

    const color = isNoShow ? '#ef4444' : '#22c55e';
    const dist = haversineDistance(p.coords[0], p.coords[1], CLINIC_COORDS[0], CLINIC_COORDS[1]);
    distances.push(dist);
    if (isNoShow) noshoCount++; else dismissCount++;

    const line = L.polyline([p.coords, CLINIC_COORDS], {
      color, weight: 3, opacity: 0.55, dashArray: '6, 8', lineCap: 'round'
    });
    line.bindTooltip(`${dist.toFixed(1)} miles to clinic`, { className: 'line-tooltip', sticky: true });

    const marker = L.marker(p.coords, { icon: makePin(color) });
    const label = L.marker(p.coords, {
      icon: L.divIcon({
        html: `<div class="patient-label-inner">${p.patientId}</div>`,
        className: 'patient-label', iconAnchor: [-4, 26]
      }), interactive: false
    });

    const statusClass = isNoShow ? 'popup-status-noshow' : 'popup-status-dismissed';
    marker.bindPopup(`
      <div class="popup-title">Patient ${p.patientId}</div>
      <div class="popup-row"><span class="popup-key">Status</span><span class="popup-val ${statusClass}">${p.status}</span></div>
      <div class="popup-row"><span class="popup-key">Address</span><span class="popup-val">${p.address}</span></div>
      <div class="popup-row"><span class="popup-key">Appt Type</span><span class="popup-val">${p.apptType || '—'}</span></div>
      <div class="popup-row"><span class="popup-key">Distance</span><span class="popup-val">${dist.toFixed(1)} mi</span></div>
      <div class="popup-row"><span class="popup-key">Median Income</span><span class="popup-val">${p.income ? '$' + parseInt(p.income).toLocaleString() : 'N/A'}</span></div>
    `);

    const layerGroup = L.layerGroup([line, marker, label]).addTo(map);
    if (isNoShow) noShowLayers.push(layerGroup);
    else dismissedLayers.push(layerGroup);
  });

  let medianDist = '—';
  if (distances.length > 0) {
    const sorted = [...distances].sort((a,b) => a-b);
    const mid = Math.floor(sorted.length/2);
    const median = sorted.length % 2 !== 0 ? sorted[mid] : (sorted[mid-1]+sorted[mid])/2;
    medianDist = `${median.toFixed(1)} mi`;
  }

  document.getElementById('stat-noshows').textContent = noshoCount;
  document.getElementById('stat-dismissed').textContent = dismissCount;
  document.getElementById('stat-distance').textContent = medianDist;
  document.getElementById('stat-period').textContent = getPeriodLabel(currentPeriod);
}

function renderTables(patients) {
  const filtered = filterByPeriod(patients, currentPeriod);
  const noShowZips = {};
  const dismissedZips = {};

  filtered.forEach(p => {
    const zip = p.zip || 'Unknown';
    const income = p.income ? '$' + parseInt(p.income).toLocaleString() : 'N/A';
    if (p.status === 'No-Show') {
      if (!noShowZips[zip]) noShowZips[zip] = { count: 0, income };
      noShowZips[zip].count++;
    } else if (p.status === 'Dismissed') {
      if (!dismissedZips[zip]) dismissedZips[zip] = { count: 0, income };
      dismissedZips[zip].count++;
    }
  });

  const sortedNoShow = Object.entries(noShowZips).sort((a,b) => b[1].count - a[1].count);
  const sortedDismissed = Object.entries(dismissedZips).sort((a,b) => b[1].count - a[1].count);

  const noShowBody = document.getElementById('noshow-table-body');
  if (sortedNoShow.length === 0) {
    noShowBody.innerHTML = '<tr><td colspan="4" style="color:var(--text-muted);text-align:center">No data</td></tr>';
  } else {
    noShowBody.innerHTML = sortedNoShow.map(([ zip, data ], i) => `
      <tr>
        <td class="zip-rank">${i+1}</td>
        <td class="zip-code">${zip}</td>
        <td class="zip-count-red">${data.count}</td>
        <td class="zip-income">${data.income}</td>
      </tr>
    `).join('');
  }

  const dismissedBody = document.getElementById('dismissed-table-body');
  if (sortedDismissed.length === 0) {
    dismissedBody.innerHTML = '<tr><td colspan="4" style="color:var(--text-muted);text-align:center">No data</td></tr>';
  } else {
    dismissedBody.innerHTML = sortedDismissed.map(([ zip, data ], i) => `
      <tr>
        <td class="zip-rank">${i+1}</td>
        <td class="zip-code">${zip}</td>
        <td class="zip-count-green">${data.count}</td>
        <td class="zip-income">${data.income}</td>
      </tr>
    `).join('');
  }
}

function updateFilters() {
  const filtered = filterByPeriod(allPatients, currentPeriod);
  renderPatients(filtered);
  renderTables(allPatients);
}

function setPeriod(period) {
  currentPeriod = period;
  document.querySelectorAll('.period-toggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.period === period);
  });
  updateFilters();
}

async function loadData() {
  const overlay = document.getElementById('loading-overlay');
  const progressEl = document.getElementById('loading-progress');
  try {
    progressEl.textContent = 'Fetching spreadsheet data...';
    const response = await fetch(CSV_URL);
    const csvText = await response.text();
    const parsed = Papa.parse(csvText, { header: true, skipEmptyLines: true });
    const rows = parsed.data;

    console.log('Total rows from CSV:', rows.length);

    const patients = rows.map(row => {
      const vals = Object.values(row);
      return {
        appointmentTime: vals[0] || '',
        location: vals[1] || '',
        status: vals[2] || '',
        apptType: vals[3] || '',
        patientId: vals[4] || '',
        address: vals[5] || '',
        sheetName: vals[6] || '',
        lat: vals[7] || '',
        lng: vals[8] || '',
        income: vals[9] || '',
        zip: vals[10] || '',
        coords: null
      };
    }).filter(p => p.address && p.patientId && (p.status === 'No-Show' || p.status === 'Dismissed'));

    console.log('Patients after filter:', patients.length);

    patients.forEach(p => {
      if (p.lat && p.lng && !isNaN(p.lat) && !isNaN(p.lng)) {
        p.coords = [parseFloat(p.lat), parseFloat(p.lng)];
      } else {
        p.coords = null;
      }
    });

    allPatients = patients;
    overlay.style.display = 'none';
    updateFilters();

  } catch(e) {
    progressEl.textContent = 'Error loading data. Please refresh.';
    console.error(e);
  }
}

loadData();
</script>
</body>
</html>
