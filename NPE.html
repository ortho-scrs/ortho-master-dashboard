<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPE Sources Attribution</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --bg:#080c14;--surface:#0e1520;--surface2:#151e2e;--border:#1e2d42;
  --accent:#0ea5e9;--accent2:#38bdf8;--text:#ffffff;
  --text-muted:#64748b;--text-dim:#94a3b8;
  --c-buda:#3b82f6;--c-leander:#f59e0b;--c-marble:#22c55e;
  --c-lakeline:#06b6d4;--c-clarkston:#a855f7;
  --s-started:#22c55e;--s-noshow:#ef4444;--s-cancelled:#f97316;
  --s-uncommitted:#0ea5e9;--s-obs:#a855f7;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:"Syne",sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:64px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:16px;}
.brand{display:flex;align-items:center;gap:12px;cursor:pointer;flex-shrink:0;}
.brand-icon{width:36px;height:36px;background:linear-gradient(135deg,#facc15,#f59e0b);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.brand-text h1{font-size:16px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#fff;}
.brand-text small{font-size:11px;color:var(--text-muted);font-family:"DM Mono",monospace;}
.header-right{display:flex;align-items:center;gap:12px;flex-shrink:0;}
.filter-group{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.filter-group button{background:transparent;border:none;color:var(--text-muted);padding:8px 13px;font-family:"Syne",sans-serif;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;border-right:1px solid var(--border);}
.filter-group button:last-child{border-right:none;}
.filter-group button:hover:not(.pf-active):not([class*="active-"]){background:var(--surface2);color:#fff;}
.pf-active{background:#0ea5e9!important;color:#fff!important;}
.active-all{background:#334155!important;color:#fff!important;}
.active-buda{background:var(--c-buda)!important;color:#fff!important;}
.active-leander{background:var(--c-leander)!important;color:#fff!important;}
.active-marble{background:var(--c-marble)!important;color:#fff!important;}
.active-lakeline{background:var(--c-lakeline)!important;color:#fff!important;}
.active-clarkston{background:var(--c-clarkston)!important;color:#fff!important;}
.kpi-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:88px;display:flex;align-items:center;flex-shrink:0;}
.kpi{display:flex;flex-direction:column;gap:4px;padding:0 28px 0 0;margin-right:28px;border-right:1px solid var(--border);}
.kpi:last-child{border-right:none;}
.kpi-lbl{font-size:10px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);font-family:"DM Mono",monospace;}
.kpi-val{font-size:26px;font-weight:800;line-height:1;color:#fff;}
.kpi-val.blue{color:#60a5fa;}
.kpi-val.green{color:#4ade80;}
.kpi-val.red{color:#f87171;}
.kpi-val.yellow{color:#fbbf24;}
.kpi-val.purple{color:#c084fc;}
.main{flex:1;padding:24px;display:flex;flex-direction:column;gap:20px;overflow-y:auto;}
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;}
.card-head{padding:16px 20px;border-bottom:1px solid var(--border);font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#fff;font-family:"DM Mono",monospace;display:flex;justify-content:space-between;align-items:center;gap:16px;}
.chart-wrap{padding:20px 24px;height:300px;position:relative;}
.pie-layout{display:flex;align-items:center;gap:24px;padding:20px 24px;height:300px;}
.pie-canvas-wrap{width:220px;height:220px;flex-shrink:0;position:relative;}
.pie-legend{flex:1;display:flex;flex-direction:column;gap:8px;overflow-y:auto;max-height:260px;}
.legend-row{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.legend-left{display:flex;align-items:center;gap:8px;font-size:12px;font-family:"DM Mono",monospace;color:var(--text-dim);}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.legend-right{display:flex;gap:12px;font-size:12px;font-family:"DM Mono",monospace;}
.legend-count{color:#fff;font-weight:700;}
.legend-pct{color:var(--text-muted);}
.tbl-filters{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.filter-label{font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);font-family:"DM Mono",monospace;margin-right:4px;}
.mini-filter{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;flex-wrap:wrap;}
.mini-filter button{background:transparent;border:none;color:var(--text-muted);padding:6px 12px;font-family:"DM Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;border-right:1px solid var(--border);}
.mini-filter button:last-child{border-right:none;}
.mini-filter button:hover:not([class*="mf-active"]){background:var(--surface2);color:#fff;}
.mf-active-all{background:#334155!important;color:#fff!important;}
.mf-active-started{background:rgba(34,197,94,.3)!important;color:#4ade80!important;}
.mf-active-noshow{background:rgba(239,68,68,.3)!important;color:#f87171!important;}
.mf-active-cancelled{background:rgba(249,115,22,.3)!important;color:#fb923c!important;}
.mf-active-uncommitted{background:rgba(14,165,233,.3)!important;color:#38bdf8!important;}
.mf-active-obs{background:rgba(168,85,247,.3)!important;color:#c084fc!important;}
.search-wrap{position:relative;display:flex;align-items:center;margin-left:auto;}
.search-wrap input{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:7px 12px 7px 32px;font-family:"DM Mono",monospace;font-size:12px;color:#fff;outline:none;width:200px;transition:border-color .2s;}
.search-wrap input::placeholder{color:var(--text-muted);}
.search-wrap input:focus{border-color:#38bdf8;}
.search-icon{position:absolute;left:10px;font-size:13px;color:var(--text-muted);pointer-events:none;}
.search-clear{position:absolute;right:8px;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:13px;padding:0;display:none;}
.search-clear.visible{display:block;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{padding:11px 16px;text-align:left;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#fff;font-family:"DM Mono",monospace;background:var(--surface2);white-space:nowrap;border-bottom:1px solid var(--border);}
thead th.sortable{cursor:pointer;user-select:none;}
thead th.sortable:hover{color:#38bdf8;}
thead th .sort-icon{margin-left:6px;font-size:10px;}
tbody td{padding:11px 16px;border-bottom:1px solid var(--border);font-family:"DM Mono",monospace;color:var(--text-dim);white-space:nowrap;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--surface2);}
.badge{display:inline-block;padding:4px 9px;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;}
.b-started{background:rgba(34,197,94,.18);color:#4ade80;}
.b-noshow{background:rgba(239,68,68,.18);color:#f87171;}
.b-cancelled{background:rgba(249,115,22,.18);color:#fb923c;}
.b-uncommitted{background:rgba(14,165,233,.18);color:#38bdf8;}
.b-obs{background:rgba(168,85,247,.18);color:#c084fc;}
.b-loc-buda{background:rgba(59,130,246,.18);color:#60a5fa;}
.b-loc-leander{background:rgba(245,158,11,.18);color:#fbbf24;}
.b-loc-marble{background:rgba(34,197,94,.18);color:#4ade80;}
.b-loc-lakeline{background:rgba(6,182,212,.18);color:#22d3ee;}
.b-loc-clarkston{background:rgba(168,85,247,.18);color:#c084fc;}
.b-loc-unknown{background:rgba(100,116,139,.18);color:#94a3b8;}
.pt-name{color:#fff;font-weight:700;}
.highlight{background:rgba(56,189,248,.25);border-radius:2px;color:#fff;}
#overlay{position:fixed;inset:0;background:rgba(8,12,20,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:20px;}
.spin{width:48px;height:48px;border:3px solid var(--border);border-top-color:#0ea5e9;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.load-txt{font-family:"DM Mono",monospace;font-size:13px;color:var(--text-muted);}
</style>
</head>
<body>
<div id="overlay"><div class="spin"></div><div class="load-txt">Loading NPE data...</div></div>
<header>
  <div class="brand" onclick="window.location.href='index.html'">
    <div class="brand-icon">🦷</div>
    <div class="brand-text"><h1>SmileCrew</h1><small>NPE Sources Attribution</small></div>
  </div>
  <div class="header-right">
    <div class="filter-group">
      <button data-period="lastmonth" onclick="setPeriod('lastmonth')">Last Month</button>
      <button data-period="q1" onclick="setPeriod('q1')">Q1</button>
      <button data-period="q2" onclick="setPeriod('q2')">Q2</button>
      <button data-period="q3" onclick="setPeriod('q3')">Q3</button>
      <button data-period="q4" onclick="setPeriod('q4')">Q4</button>
      <button class="pf-active" data-period="annual" onclick="setPeriod('annual')">Annual</button>
      <button data-period="alltime" onclick="setPeriod('alltime')">All Time</button>
    </div>
    <div class="filter-group">
      <button class="active-all" data-loc="all" onclick="setLoc('all')">All</button>
      <button data-loc="Clarkston" onclick="setLoc('Clarkston')">Clarkston</button>
      <button data-loc="Buda" onclick="setLoc('Buda')">Buda</button>
      <button data-loc="Leander" onclick="setLoc('Leander')">Leander</button>
      <button data-loc="Lakeline" onclick="setLoc('Lakeline')">Lakeline</button>
      <button data-loc="Marble Falls" onclick="setLoc('Marble Falls')">Marble Falls</button>
    </div>
  </div>
</header>
<div class="kpi-bar">
  <div class="kpi"><div class="kpi-lbl">Total Appointments</div><div class="kpi-val blue" id="k-total">-</div></div>
  <div class="kpi"><div class="kpi-lbl">Show Rate</div><div class="kpi-val green" id="k-show">-</div></div>
  <div class="kpi"><div class="kpi-lbl">No-Show Rate</div><div class="kpi-val red" id="k-noshow">-</div></div>
  <div class="kpi"><div class="kpi-lbl">Top Source</div><div class="kpi-val yellow" id="k-topsource" style="font-size:16px">-</div></div>
  <div class="kpi"><div class="kpi-lbl">Cancelled %</div><div class="kpi-val purple" id="k-cancelled">-</div></div>
</div>
<div class="main">
  <div class="charts-row">
    <div class="card">
      <div class="card-head"><span>Appointments by Source</span></div>
      <div class="pie-layout">
        <div class="pie-canvas-wrap"><canvas id="pieChart"></canvas></div>
        <div class="pie-legend" id="pie-legend"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><span>Status Breakdown by Source</span></div>
      <div class="chart-wrap"><canvas id="barChart"></canvas></div>
    </div>
  </div>
  <div class="card">
    <div class="card-head">
      <span>Appointment Records</span>
      <div style="display:flex;align-items:center;gap:12px;">
        <span id="tbl-count" style="color:var(--text-muted);font-size:11px;font-weight:400;letter-spacing:0;text-transform:none"></span>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search..." oninput="onSearch(this.value)">
          <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
        </div>
      </div>
    </div>
    <div class="tbl-filters">
      <span class="filter-label">Status:</span>
      <div class="mini-filter">
        <button class="mf-active-all" data-status="all" onclick="setStatus('all')">All</button>
        <button data-status="started" onclick="setStatus('started')">Started</button>
        <button data-status="noshow" onclick="setStatus('noshow')">No-Show</button>
        <button data-status="cancelled" onclick="setStatus('cancelled')">Cancelled</button>
        <button data-status="uncommitted" onclick="setStatus('uncommitted')">Uncommitted</button>
        <button data-status="obs" onclick="setStatus('obs')">OBS</button>
      </div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Patient</th>
          <th>Source</th>
          <th>Status</th>
          <th>Location</th>
          <th class="sortable" id="th-date" onclick="toggleDateSort()">Date<span class="sort-icon" id="date-sort-icon">⇅</span></th>
          <th>Month/Year</th>
        </tr></thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
const CSV='https://script.google.com/macros/s/AKfycbwitgD7_9mXTrw9RIj6PLwqelo7qVwakzJX32LHk-VPPQyBRHORR0Svd0wfg0iPcCyR/exec';
const SOURCE_COLORS=['#0ea5e9','#a855f7','#22c55e','#f59e0b','#ef4444','#ec4899','#f97316','#06b6d4','#84cc16','#6366f1'];
let all=[],period='annual',loc='all',statusFilter='all',dateSort='desc',searchQuery='';
let pieChart=null,barChart=null;

function statusKey(s){
  if(!s)return'unknown';
  const v=s.toLowerCase();
  if(v.includes('started'))return'started';
  if(v.includes('no-show')||v.includes('noshow')||v.includes('no show'))return'noshow';
  if(v.includes('cancelled')||v.includes('canceled'))return'cancelled';
  if(v.includes('uncommitted'))return'uncommitted';
  if(v.includes('obs'))return'obs';
  return'unknown';
}

function statusClass(s){
  const k=statusKey(s);
  const map={started:'b-started',noshow:'b-noshow',cancelled:'b-cancelled',uncommitted:'b-uncommitted',obs:'b-obs'};
  return map[k]||'b-uncommitted';
}

function locClass(l){
  if(!l)return'b-loc-unknown';
  const v=l.toLowerCase();
  if(v.includes('buda'))return'b-loc-buda';
  if(v.includes('leander'))return'b-loc-leander';
  if(v.includes('marble'))return'b-loc-marble';
  if(v.includes('lakeline'))return'b-loc-lakeline';
  if(v.includes('clarkston'))return'b-loc-clarkston';
  return'b-loc-unknown';
}

function fmtDate(d){
  if(!d)return'-';
  const dt=new Date(d);
  if(isNaN(dt))return d;
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function highlight(text,q){
  if(!q||!text)return text;
  const e=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return String(text).replace(new RegExp('('+e+')','gi'),'<mark class="highlight">$1</mark>');
}

function filterByPeriod(pts){
  const now=new Date();
  const lm=new Date(now.getFullYear(),now.getMonth()-1,1);
  return pts.filter(p=>{
    const d=new Date(p.date);
    if(isNaN(d))return true;
    if(period==='lastmonth')return d.getFullYear()===lm.getFullYear()&&d.getMonth()===lm.getMonth();
    if(period==='q1')return d.getFullYear()===now.getFullYear()&&d.getMonth()<=2;
    if(period==='q2')return d.getFullYear()===now.getFullYear()&&d.getMonth()>=3&&d.getMonth()<=5;
    if(period==='q3')return d.getFullYear()===now.getFullYear()&&d.getMonth()>=6&&d.getMonth()<=8;
    if(period==='q4')return d.getFullYear()===now.getFullYear()&&d.getMonth()>=9;
    if(period==='annual')return d.getFullYear()===now.getFullYear();
    return true;
  });
}

function getBase(){
  let pts=loc==='all'?all:all.filter(p=>p.loc===loc);
  return filterByPeriod(pts);
}

function getFiltered(){
  let pts=getBase();
  if(statusFilter!=='all')pts=pts.filter(p=>statusKey(p.status)===statusFilter);
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    pts=pts.filter(p=>
      (p.name||'').toLowerCase().includes(q)||
      (p.source||'').toLowerCase().includes(q)||
      (p.status||'').toLowerCase().includes(q)||
      (p.loc||'').toLowerCase().includes(q)
    );
  }
  return pts;
}

function renderKPIs(base){
  const total=base.length;
  const shows=base.filter(p=>statusKey(p.status)==='started').length;
  const noshows=base.filter(p=>statusKey(p.status)==='noshow').length;
  const cancelled=base.filter(p=>statusKey(p.status)==='cancelled').length;
  // Top source
  const srcCount={};
  base.forEach(p=>{if(p.source)srcCount[p.source]=(srcCount[p.source]||0)+1;});
  const topSrc=Object.entries(srcCount).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('k-total').textContent=total;
  document.getElementById('k-show').textContent=total>0?Math.round(shows/total*100)+'%':'-';
  document.getElementById('k-noshow').textContent=total>0?Math.round(noshows/total*100)+'%':'-';
  document.getElementById('k-topsource').textContent=topSrc?topSrc[0]:'-';
  document.getElementById('k-cancelled').textContent=total>0?Math.round(cancelled/total*100)+'%':'-';
}

function renderPie(base){
  const srcCount={};
  base.forEach(p=>{if(p.source)srcCount[p.source]=(srcCount[p.source]||0)+1;});
  const sorted=Object.entries(srcCount).sort((a,b)=>b[1]-a[1]);
  const total=base.length;
  const labels=sorted.map(s=>s[0]);
  const data=sorted.map(s=>s[1]);
  const colors=labels.map((_,i)=>SOURCE_COLORS[i%SOURCE_COLORS.length]);

  if(pieChart)pieChart.destroy();
  const ctx=document.getElementById('pieChart').getContext('2d');
  pieChart=new Chart(ctx,{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors.map(c=>c+'cc'),borderColor:colors,borderWidth:2}]},
    options:{responsive:true,maintainAspectRatio:true,cutout:'60%',
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#151e2e',borderColor:'#1e2d42',borderWidth:1,titleColor:'#fff',bodyColor:'#94a3b8',callbacks:{label:c=>` ${c.parsed} (${Math.round(c.parsed/total*100)}%)`}}}}
  });

  const legend=document.getElementById('pie-legend');
  legend.innerHTML=sorted.map((s,i)=>`
    <div class="legend-row">
      <div class="legend-left">
        <div class="legend-dot" style="background:${colors[i]}"></div>
        <span>${s[0]}</span>
      </div>
      <div class="legend-right">
        <span class="legend-count">${s[1]}</span>
        <span class="legend-pct">${Math.round(s[1]/total*100)}%</span>
      </div>
    </div>
  `).join('');
}

function renderBar(base){
  const srcCount={};
  base.forEach(p=>{if(p.source)srcCount[p.source]=(srcCount[p.source]||0)+1;});
  const sources=Object.entries(srcCount).sort((a,b)=>b[1]-a[1]).slice(0,8).map(s=>s[0]);
  const statuses=['started','noshow','cancelled','uncommitted','obs'];
  const statusLabels=['Started','No-Show','Cancelled','Uncommitted','OBS'];
  const statusColors=['#22c55e','#ef4444','#f97316','#0ea5e9','#a855f7'];

  const datasets=statuses.map((sk,i)=>({
    label:statusLabels[i],
    data:sources.map(src=>base.filter(p=>p.source===src&&statusKey(p.status)===sk).length),
    backgroundColor:statusColors[i]+'55',
    borderColor:statusColors[i],
    borderWidth:2,
    borderRadius:4
  }));

  if(barChart)barChart.destroy();
  const ctx=document.getElementById('barChart').getContext('2d');
  barChart=new Chart(ctx,{
    type:'bar',
    data:{labels:sources,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{color:'#94a3b8',font:{family:'DM Mono',size:11},boxWidth:12}},
        tooltip:{backgroundColor:'#151e2e',borderColor:'#1e2d42',borderWidth:1,titleColor:'#fff',bodyColor:'#94a3b8'}},
      scales:{
        x:{stacked:false,grid:{color:'#1e2d42'},ticks:{color:'#cbd5e1',font:{family:'DM Mono',size:10},maxRotation:25}},
        y:{stacked:false,grid:{color:'#1e2d42'},ticks:{color:'#cbd5e1',font:{family:'DM Mono',size:11},stepSize:1},beginAtZero:true}
      }}
  });
}

function renderTable(pts){
  const tbody=document.getElementById('tbl-body');
  let sorted=[...pts];
  if(dateSort==='asc')sorted.sort((a,b)=>new Date(a.date)-new Date(b.date));
  else sorted.sort((a,b)=>new Date(b.date)-new Date(a.date));
  document.getElementById('tbl-count').textContent=sorted.length+' records';
  if(!sorted.length){
    tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:24px">'+(searchQuery?'No records match "'+searchQuery+'"':'No records found')+'</td></tr>';
    return;
  }
  const q=searchQuery;
  tbody.innerHTML=sorted.map(p=>`
    <tr>
      <td class="pt-name">${q?highlight(p.name,q):p.name}</td>
      <td>${q?highlight(p.source,q):p.source}</td>
      <td><span class="badge ${statusClass(p.status)}">${p.status}</span></td>
      <td><span class="badge ${locClass(p.loc)}">${p.loc}</span></td>
      <td>${fmtDate(p.date)}</td>
      <td>${p.monthYear||'-'}</td>
    </tr>
  `).join('');
}

function update(){
  const base=getBase();
  const filtered=getFiltered();
  renderKPIs(base);
  renderPie(base);
  renderBar(base);
  renderTable(filtered);
}

function setPeriod(p){
  period=p;
  document.querySelectorAll('.filter-group button[data-period]').forEach(b=>b.classList.toggle('pf-active',b.dataset.period===p));
  update();
}

function setLoc(l){
  loc=l;
  document.querySelectorAll('.filter-group button[data-loc]').forEach(b=>{
    b.className=b.className.replace(/active-\S+/g,'').trim();
    if(b.dataset.loc===l){
      const map={'all':'active-all','Buda':'active-buda','Leander':'active-leander','Marble Falls':'active-marble','Lakeline':'active-lakeline','Clarkston':'active-clarkston'};
      b.classList.add(map[l]||'active-all');
    }
  });
  update();
}

function setStatus(s){
  statusFilter=s;
  document.querySelectorAll('.mini-filter button').forEach(b=>{
    b.className='';
    if(b.dataset.status===s)b.className='mf-active-'+s;
  });
  renderTable(getFiltered());
}

function toggleDateSort(){
  dateSort=dateSort==='desc'?'asc':'desc';
  document.getElementById('date-sort-icon').textContent=dateSort==='asc'?'▲':'▼';
  renderTable(getFiltered());
}

function onSearch(val){
  searchQuery=val.trim();
  document.getElementById('search-clear').classList.toggle('visible',searchQuery.length>0);
  renderTable(getFiltered());
}

function clearSearch(){
  searchQuery='';
  document.getElementById('search-input').value='';
  document.getElementById('search-clear').classList.remove('visible');
  renderTable(getFiltered());
}

async function load(){
  try{
    const res=await fetch(CSV);
    const txt=await res.text();
    const parsed=Papa.parse(txt,{header:true,skipEmptyLines:true});
    all=parsed.data.map(row=>{
      const v=Object.values(row);
      return{name:v[0]||'',source:v[1]||'',status:v[2]||'',loc:v[3]||'',date:v[4]||'',monthYear:v[5]||''};
    }).filter(p=>p.name||p.source);
    document.getElementById('overlay').style.display='none';
    update();
  }catch(e){
    document.querySelector('.load-txt').textContent='Error loading data. Please refresh.';
    console.error(e);
  }
}

load();
setInterval(load,60000);
</script>
</body>
</html>
